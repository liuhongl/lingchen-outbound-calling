<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LiveKit Web 调试</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --panel: #f9fbfd;
        --text: #182230;
        --muted: #667085;
        --line: #d7deea;
        --blue: #175cd3;
        --blue-dark: #0b4bb3;
        --green: #067647;
        --red: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(1120px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.2;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .nav a {
        color: var(--blue);
        text-decoration: none;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text);
        font: inherit;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        background: var(--blue);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }

      button:hover {
        background: var(--blue-dark);
      }

      button.secondary {
        background: #eef4ff;
        color: var(--blue);
      }

      button.secondary:hover {
        background: #dce9ff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .mic-panel {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }

      .mic-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .mic-value {
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .meter {
        height: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #eef2f6;
      }

      .meter-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--green), var(--blue));
        transition: width 80ms linear;
      }

      .mic-hint {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        min-height: 44px;
        border-radius: 6px;
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.ok {
        color: var(--green);
      }

      .status.error {
        color: var(--red);
      }

      .rooms {
        display: grid;
        gap: 10px;
      }

      .remote-audio {
        display: grid;
        gap: 8px;
      }

      .participant {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }

      .participant span:last-child {
        color: var(--muted);
      }

      .track-row {
        display: grid;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
      }

      .track-row strong {
        font-size: 14px;
      }

      .track-row span {
        color: var(--muted);
        font-size: 12px;
      }

      .track-row audio {
        width: 100%;
      }

      .event-list,
      .latency-list {
        display: grid;
        gap: 8px;
      }

      .agent-event,
      .latency-row {
        display: grid;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: var(--panel);
      }

      .agent-event strong,
      .latency-row strong {
        font-size: 13px;
      }

      .agent-event span,
      .latency-row span {
        color: var(--muted);
        font-size: 12px;
      }

      .agent-event.asr_final strong,
      .agent-event.llm_response_final strong,
      .agent-event.tts_audio_publish_finished strong {
        color: var(--green);
      }

      .agent-event.asr_error strong,
      .agent-event.event_sink_error strong {
        color: var(--red);
      }

      pre {
        max-height: 280px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #101828;
        color: #e4e7ec;
        padding: 12px;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <h1>LiveKit Web 调试</h1>
        <nav class="nav" aria-label="主导航">
          <a href="/outbound-test">外呼测试</a>
          <a href="/browser-realtime-test">浏览器对话</a>
          <a href="/webrtc-agent-test">WebRTC 坐席</a>
          <a href="/docs/handoff">交接文档</a>
        </nav>
      </div>

      <section class="grid">
        <form class="panel" id="joinForm">
          <label>
            Room
            <input id="room" name="room" value="demo" autocomplete="off" />
          </label>
          <label>
            Identity
            <input id="identity" name="identity" value="browser-user" autocomplete="off" />
          </label>
          <label>
            Display Name
            <input id="name" name="name" value="浏览器用户" autocomplete="off" />
          </label>
          <div class="actions">
            <button type="submit">加入 Room</button>
            <button class="secondary" type="button" id="leaveButton">离开</button>
          </div>
          <section class="mic-panel" aria-label="本地麦克风">
            <div class="mic-header">
              <span>Microphone</span>
              <span class="mic-value" id="micValue">RMS 0</span>
            </div>
            <div class="meter" aria-hidden="true">
              <div class="meter-fill" id="micMeterFill"></div>
            </div>
            <div class="mic-hint" id="micHint">加入后显示本地输入强度</div>
          </section>
        </form>

        <section class="panel">
          <div class="status" id="status">未连接</div>
          <h2>Participants</h2>
          <div class="rooms" id="participants"></div>
          <h2>Remote Audio</h2>
          <div class="remote-audio" id="remoteAudioTracks"></div>
          <h2>Remote Track Events</h2>
          <pre id="remoteTrackEvents">[]</pre>
          <h2>Agent Events</h2>
          <div class="event-list" id="agentEvents"></div>
          <h2>Latency</h2>
          <div class="latency-list" id="latencySummary"></div>
          <h2>Session</h2>
          <pre id="sessionOutput">{}</pre>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("joinForm");
      const statusBox = document.getElementById("status");
      const output = document.getElementById("sessionOutput");
      const participants = document.getElementById("participants");
      const remoteAudioTracks = document.getElementById("remoteAudioTracks");
      const remoteTrackEvents = document.getElementById("remoteTrackEvents");
      const agentEventsBox = document.getElementById("agentEvents");
      const latencySummary = document.getElementById("latencySummary");
      const leaveButton = document.getElementById("leaveButton");
      const micValue = document.getElementById("micValue");
      const micMeterFill = document.getElementById("micMeterFill");
      const micHint = document.getElementById("micHint");
      let room = null;
      let remoteAudioElements = new Map();
      let trackEvents = [];
      let agentEvents = [];
      let agentEventCursor = 0;
      let agentEventPollTimer = 0;
      let activeAgentEventRoom = "";
      let micMonitor = null;

      function setStatus(text, kind = "") {
        statusBox.textContent = text;
        statusBox.className = `status ${kind}`.trim();
      }

      function apiUrl(path) {
        return location.protocol === "file:" ? `http://127.0.0.1:9100${path}` : path;
      }

      async function loadLiveKitStatus() {
        try {
          const response = await fetch(apiUrl("/ready"));
          const payload = await response.json();
          const livekit = payload.config && payload.config.livekit;
          if (!livekit || !livekit.enabled) {
            setStatus("LiveKit 未启用", "error");
            return;
          }
          setStatus(`LiveKit 已启用：${livekit.url}`, "ok");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      }

      function renderParticipants() {
        participants.innerHTML = "";
        if (!room) return;
        const rows = [
          [room.localParticipant.identity, "local"],
          ...Array.from(room.remoteParticipants.values()).map((participant) => [
            participant.identity,
            "remote",
          ]),
        ];
        for (const [identity, role] of rows) {
          const row = document.createElement("div");
          row.className = "participant";
          row.innerHTML = `<span>${escapeHtml(identity)}</span><span>${role}</span>`;
          participants.appendChild(row);
        }
      }

      function renderTrackEvents() {
        remoteTrackEvents.textContent = JSON.stringify(trackEvents.slice(-30), null, 2);
      }

      function renderAgentEvents() {
        agentEventsBox.innerHTML = "";
        if (!agentEvents.length) {
          const empty = document.createElement("div");
          empty.className = "agent-event";
          empty.innerHTML = "<strong>等待 Agent 事件</strong><span>启动 Agent 时传入 --event-sink-url 后显示</span>";
          agentEventsBox.appendChild(empty);
          renderLatencySummary();
          return;
        }
        for (const event of agentEvents.slice(-30).reverse()) {
          const row = document.createElement("div");
          row.className = `agent-event ${eventClassName(event.event)}`;
          row.innerHTML = `
            <strong>${escapeHtml(event.event || "event")}</strong>
            <span>${escapeHtml(agentEventSummary(event))}</span>
          `;
          agentEventsBox.appendChild(row);
        }
        renderLatencySummary();
      }

      function agentEventSummary(event) {
        const parts = [];
        if (event.text) parts.push(event.text);
        if (event.input_text) parts.push(`input=${event.input_text}`);
        if (event.provider) parts.push(`provider=${event.provider}`);
        if (event.model) parts.push(`model=${event.model}`);
        if (event.audio_duration_ms) parts.push(`audio=${event.audio_duration_ms}ms`);
        if (event.error) parts.push(`error=${event.error}`);
        if (event.receivedAtMs) parts.push(new Date(event.receivedAtMs).toLocaleTimeString());
        return parts.join(" · ") || JSON.stringify(event);
      }

      function eventClassName(value) {
        return String(value || "").replaceAll(/[^a-zA-Z0-9_-]/g, "_");
      }

      function renderLatencySummary() {
        latencySummary.innerHTML = "";
        const latest = latestAgentStageTimes();
        const rows = [
          ["ASR → LLM", latest.asr_final, latest.llm_response_started],
          ["LLM 生成", latest.llm_response_started, latest.llm_response_final],
          ["LLM → TTS", latest.llm_response_final, latest.tts_started],
          ["TTS 合成", latest.tts_started, latest.tts_final],
          ["TTS 发布", latest.tts_final, latest.tts_audio_publish_finished],
        ];
        for (const [label, start, end] of rows) {
          const row = document.createElement("div");
          row.className = "latency-row";
          const value = start && end ? `${end - start}ms` : "等待事件";
          row.innerHTML = `<strong>${label}</strong><span>${value}</span>`;
          latencySummary.appendChild(row);
        }
      }

      function latestAgentStageTimes() {
        const stages = {};
        for (const event of agentEvents) {
          if (!event.event || !event.receivedAtMs) continue;
          stages[event.event] = event.receivedAtMs;
        }
        return stages;
      }

      function resetAgentEvents() {
        stopAgentEventPolling();
        agentEvents = [];
        agentEventCursor = 0;
        activeAgentEventRoom = "";
        renderAgentEvents();
      }

      function startAgentEventPolling(roomName) {
        stopAgentEventPolling();
        activeAgentEventRoom = roomName;
        agentEvents = [];
        agentEventCursor = 0;
        renderAgentEvents();
        pollAgentEvents();
        agentEventPollTimer = window.setInterval(pollAgentEvents, 1000);
      }

      function stopAgentEventPolling() {
        if (!agentEventPollTimer) return;
        window.clearInterval(agentEventPollTimer);
        agentEventPollTimer = 0;
      }

      async function pollAgentEvents() {
        if (!activeAgentEventRoom) return;
        try {
          const url = apiUrl(
            `/livekit/web-debug/events?room=${encodeURIComponent(activeAgentEventRoom)}&after=${agentEventCursor}`
          );
          const response = await fetch(url);
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || "agent events fetch failed");
          if (!Array.isArray(payload.events) || !payload.events.length) return;
          agentEvents.push(...payload.events);
          agentEvents = agentEvents.slice(-100);
          agentEventCursor = payload.nextSequence || agentEvents.at(-1).sequence || agentEventCursor;
          renderAgentEvents();
        } catch (error) {
          const fallback = {
            event: "agent_events_error",
            error: errorMessage(error),
            receivedAtMs: Date.now(),
          };
          agentEvents.push(fallback);
          renderAgentEvents();
        }
      }

      function appendTrackEvent(event) {
        trackEvents.push({
          time: new Date().toISOString(),
          ...event,
        });
        renderTrackEvents();
      }

      function errorMessage(error) {
        if (!error) return "unknown error";
        const name = error.name ? `${error.name}: ` : "";
        return `${name}${error.message || String(error)}`;
      }

      async function withTimeout(promise, timeoutMs, label) {
        let timeoutId = 0;
        const timeout = new Promise((_, reject) => {
          timeoutId = setTimeout(
            () => reject(new Error(`${label} timeout after ${timeoutMs}ms`)),
            timeoutMs
          );
        });
        try {
          return await Promise.race([promise, timeout]);
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function trackKey(track, participant) {
        return `${participant.identity}:${track.sid || track.name || track.kind}`;
      }

      function trackSubscribed(track, publication, participant) {
        appendTrackEvent({
          event: "remote_audio_track_subscribed",
          participant: participant.identity,
          trackSid: track.sid || "",
          trackName: track.name || "",
          kind: track.kind || "",
        });
        if (track.kind !== LivekitClient.Track.Kind.Audio) return;

        const key = trackKey(track, participant);
        const element = track.attach();
        element.autoplay = true;
        element.controls = true;
        element.dataset.trackKey = key;

        const row = document.createElement("div");
        row.className = "track-row";
        row.dataset.trackKey = key;
        row.appendChild(Object.assign(document.createElement("strong"), {
          textContent: participant.identity,
        }));
        row.appendChild(Object.assign(document.createElement("span"), {
          textContent: track.name || track.sid || "remote audio",
        }));
        row.appendChild(element);
        remoteAudioTracks.appendChild(row);
        remoteAudioElements.set(key, { row, element, track });
      }

      function trackUnsubscribed(track, publication, participant) {
        appendTrackEvent({
          event: "remote_audio_track_unsubscribed",
          participant: participant.identity,
          trackSid: track.sid || "",
          trackName: track.name || "",
          kind: track.kind || "",
        });
        const key = trackKey(track, participant);
        const entry = remoteAudioElements.get(key);
        if (!entry) return;
        track.detach(entry.element);
        entry.row.remove();
        remoteAudioElements.delete(key);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function resetMicrophoneMeter() {
        micValue.textContent = "RMS 0";
        micMeterFill.style.width = "0%";
        micHint.textContent = "加入后显示本地输入强度";
      }

      function stopMicrophoneMonitor() {
        if (!micMonitor) return;
        cancelAnimationFrame(micMonitor.animationFrame);
        micMonitor.stream.getTracks().forEach((track) => track.stop());
        if (micMonitor.audioContext && micMonitor.audioContext.state !== "closed") {
          micMonitor.audioContext.close();
        }
        micMonitor = null;
        resetMicrophoneMeter();
      }

      function startMicrophoneMonitor(stream) {
        stopMicrophoneMonitor();
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) {
          micHint.textContent = "当前浏览器不支持音量检测";
          return;
        }

        const audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);

        const samples = new Float32Array(analyser.fftSize);
        const monitor = {
          stream,
          audioContext,
          animationFrame: 0,
        };

        const render = () => {
          analyser.getFloatTimeDomainData(samples);
          let sum = 0;
          let peak = 0;
          for (const sample of samples) {
            sum += sample * sample;
            peak = Math.max(peak, Math.abs(sample));
          }
          const rms = Math.sqrt(sum / samples.length);
          const level = Math.min(100, Math.round(rms * 350));
          micValue.textContent = `RMS ${rms.toFixed(4)}`;
          micMeterFill.style.width = `${level}%`;
          micHint.textContent =
            peak > 0.03 ? "检测到本地麦克风输入" : "输入偏低，请靠近麦克风或检查 Chrome 输入设备";
          monitor.animationFrame = requestAnimationFrame(render);
        };

        micMonitor = monitor;
        render();
      }

      async function requestMicrophoneAccess() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("当前浏览器不支持 getUserMedia");
        }
        return navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
          video: false,
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await leaveRoom();
        try {
          setStatus("请求麦克风权限...");
          const micStream = await requestMicrophoneAccess();
          startMicrophoneMonitor(micStream);

          setStatus("创建 LiveKit session...");
          const payload = Object.fromEntries(new FormData(form).entries());
          const response = await fetch(apiUrl("/livekit/web-debug/session"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const session = await response.json();
          output.textContent = JSON.stringify(
            { ...session, token: session.token ? `${session.token.slice(0, 24)}...` : "" },
            null,
            2
          );
          if (!response.ok) throw new Error(session.error || "session create failed");
          if (!window.LivekitClient) throw new Error("LiveKit browser SDK 未加载");
          startAgentEventPolling(session.room);

          room = new LivekitClient.Room();
          room.on(LivekitClient.RoomEvent.ParticipantConnected, renderParticipants);
          room.on(LivekitClient.RoomEvent.ParticipantDisconnected, renderParticipants);
          room.on(LivekitClient.RoomEvent.TrackSubscribed, trackSubscribed);
          room.on(LivekitClient.RoomEvent.TrackUnsubscribed, trackUnsubscribed);
          room.on(LivekitClient.RoomEvent.Disconnected, () => {
            setStatus("已断开");
            renderParticipants();
          });
          await withTimeout(
            room.connect(session.livekitUrl, session.token),
            12000,
            "LiveKit connect"
          );
          try {
            await withTimeout(
              room.localParticipant.setMicrophoneEnabled(true),
              12000,
              "microphone enable"
            );
            setStatus(`已加入 ${session.room}`, "ok");
          } catch (error) {
            setStatus(`已加入 ${session.room}，麦克风不可用：${errorMessage(error)}`, "error");
          }
          renderParticipants();
        } catch (error) {
          setStatus(errorMessage(error), "error");
        }
      });

      leaveButton.addEventListener("click", leaveRoom);

      async function leaveRoom() {
        stopMicrophoneMonitor();
        resetAgentEvents();
        if (room) {
          room.disconnect();
          room = null;
        }
        for (const entry of remoteAudioElements.values()) {
          entry.track.detach(entry.element);
          entry.row.remove();
        }
        remoteAudioElements = new Map();
        trackEvents = [];
        renderTrackEvents();
        renderParticipants();
      }

      loadLiveKitStatus();
      renderTrackEvents();
      renderAgentEvents();
    </script>
  </body>
</html>
