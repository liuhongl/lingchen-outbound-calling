[server]
host = "127.0.0.1"
port = 9100

[logging]
level = "INFO"

[freeswitch]
media_host = "0.0.0.0"
media_port = 9101
sample_rate = 8000
phone_codec = "PCMA"
channels = 1
frame_duration_ms = 20
echo_mode = "raw"

[event_socket]
enabled = false
host = "127.0.0.1"
port = 18021
password_env = "FREESWITCH_ESL_PASSWORD"

[outbound]
enabled = true
endpoint_template = "sofia_contact:*/{destination}"
dialplan_extension = "9199"
dialplan_context = "default"
caller_id_name = "AI_Assistant"
caller_id_number = "9000"
originate_timeout_seconds = 30
max_recent_calls = 200

[doubao_s2s]
app_id_env = "DOUBAO_S2S_APP_ID"
access_token_env = "DOUBAO_S2S_ACCESS_TOKEN"
app_key_env = "DOUBAO_S2S_APP_KEY"
resource_id = "volc.speech.dialog"
websocket_url = "wss://openspeech.bytedance.com/api/v3/realtime/dialogue"
speaker = "zh_female_vv_jupiter_bigtts"
output_sample_rate = 24000

[server_vad]
type = "server_vad"
threshold = 0.5
prefix_padding_ms = 300
silence_duration_ms = 800
create_response = true
interrupt_response = true

[playback]
jitter_buffer_ms = 240
send_interval_ms = 10
tail_silence_ms = 300

[vad]
speech_rms_threshold = 300
start_speech_ms = 60
end_silence_ms = 500
min_speech_ms = 240
max_utterance_ms = 12000
pre_speech_ms = 160
keep_silence_ms = 160
barge_in_enabled = false

[features]
metrics_enabled = true
recording_enabled = false
recording_dir = "/tmp/recov_ten_handoff_recordings"
recording_host_dir = ""
inbound_rms_diagnostics_enabled = false

[call_recording]
enabled = false
directory = "/var/lib/freeswitch/recordings"
upload_enabled = false
host_directory = "./freeswitch-local/recordings"
object_prefix = "recordings"
upload_timeout_seconds = 30.0
opening_warmup_ms = 600
opening_source_debug_enabled = false

[flow_callback]
enabled = false
topic = "recov-flow-callback"
producer_group = "recov-ten-gateway"

[flow_callback.http]
enabled = false
base_url = "http://java-flow.test"
path = "/system/recov/flow/external/callback"
client_id = "python-ai-call"
secret_env = "FLOW_CALLBACK_HMAC_SECRET_AI_CALL"
timeout_seconds = 10.0
max_attempts = 1
retry_backoff_seconds = 0.2

[rocketmq]
enabled = false
endpoint = "http://118.89.137.44/"
name_server = "118.89.137.44:9876"
producer_group = "recov-ten-gateway"
callback_topic = "recov-flow-callback"
send_timeout_ms = 3000

[rocketmq.acl]
enabled = false
access_key_env = "ROCKETMQ_ACCESS_KEY"
secret_key_env = "ROCKETMQ_SECRET_KEY"
security_token_env = "ROCKETMQ_SECURITY_TOKEN"

[postgres]
enabled = false
dsn_env = "POSTGRES_DSN"
min_pool_size = 1
max_pool_size = 5
command_timeout_seconds = 5.0

[human_transcript]
enabled = false
provider = "http_json"
http_url = "http://127.0.0.1:9200/handoff-transcript"
timeout_seconds = 180.0

[handoff]
wait_timeout_seconds = 180

[livekit]
enabled = false
url = "ws://127.0.0.1:7880"
api_key_env = "LIVEKIT_API_KEY"
api_secret_env = "LIVEKIT_API_SECRET"
web_debug_room_prefix = "web-debug"
web_debug_token_ttl_seconds = 1800
sip_outbound_real_calls_enabled = false
# LiveKit 创建 outbound trunk 后生成的 trunk id，不是 SIP proxy 地址。
sip_outbound_trunk_id = ""
# 当前服务商允许的主叫显号是 037123124845；被叫号码使用 18518968743 这类国内原始手机号，不加 +86 / 86 / 0 / 9。
sip_outbound_caller_id = "037123124845"
sip_outbound_room_prefix = "sip-outbound"
